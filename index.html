<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="spacexOS - a personal web operating system">
  <title>spacexOS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Boot screen -->
  <div id="boot">
    <div id="boot-card">
      <h1>spacex<span class="c-cyan">O</span><span class="c-pink">S</span></h1>
      <p class="boot-sub">a personal computer, somewhere in orbit</p>
      <div class="boot-bar">
        <div class="boot-fill" id="boot-fill"></div>
      </div>
      <p class="boot-pct" id="boot-pct">0%</p>
      <button id="boot-btn" class="btn hidden">Launch</button>
      <p class="tiny">Made with HTML, CSS &amp; JavaScript. No password.</p>
    </div>
  </div>

  <!-- Menu bar -->
  <div id="menu" class="hidden">
    <div id="menu-left">
      <span id="menu-title">spacexOS</span>
      <a class="menu-link" data-app="about">About</a>
      <a class="menu-link" data-app="notes">Notes</a>
      <a class="menu-link" data-app="settings">Settings</a>
    </div>
    <div id="menu-right">
      <button id="bg-btn">Wallpaper</button>
      <span id="time">00:00:00</span>
    </div>
  </div>

  <!-- Desktop -->
  <div id="desktop" class="hidden">
    <div class="icon" data-app="about">
      <div class="icon-badge badge-cyan"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 3.5-6 8-6s8 2 8 6" />
        </svg></div>
      <span>About Me</span>
    </div>
    <div class="icon" data-app="notes">
      <div class="icon-badge badge-purple"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <path d="M6 3h9l4 4v14H6z" />
          <path d="M9 8h3M9 12h6M9 16h6" />
        </svg></div>
      <span>Notes</span>
    </div>
    <div class="icon" data-app="terminal">
      <div class="icon-badge badge-green"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <path d="M7 9l3 3-3 3M13 15h4" />
        </svg></div>
      <span>Terminal</span>
    </div>
    <div class="icon" data-app="synth">
      <div class="icon-badge badge-pink"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <circle cx="7" cy="18" r="2.5" />
          <circle cx="17" cy="16" r="2.5" />
          <path d="M9.5 18V6l10-2v12" />
        </svg></div>
      <span>Synth</span>
    </div>
    <div class="icon" data-app="draw">
      <div class="icon-badge badge-blue"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <path d="M4 20l4-1 11-11-3-3L5 16z" />
          <path d="M14 6l3 3" />
        </svg></div>
      <span>Draw</span>
    </div>
    <div class="icon" data-app="calc">
      <div class="icon-badge badge-yellow"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <rect x="4" y="3" width="16" height="18" rx="2" />
          <path d="M7 7h10M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" />
        </svg></div>
      <span>Calculator</span>
    </div>
    <div class="icon" data-app="game">
      <div class="icon-badge badge-red"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8">
          <path d="M12 2c3 2 5 6 5 11l-2 3H9l-2-3c0-5 2-9 5-11z" />
          <circle cx="12" cy="9" r="1.5" />
          <path d="M9 17l-2 4M15 17l2 4" />
        </svg></div>
      <span>Game</span>
    </div>
    <div class="icon" data-app="pomodoro">
      <div class="icon-badge badge-red"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 6v6l4 2" />
        </svg></div>
      <span>Timer</span>
    </div>
    <div class="icon" data-app="tictac">
      <div class="icon-badge badge-yellow"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 4h16v16H4z" />
          <path d="M8 4v16M16 4v16M4 8h16M4 16h16" />
        </svg></div>
      <span>Tic-Tac-Toe</span>
    </div>
    <div class="icon" data-app="todo">
      <div class="icon-badge badge-green"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 6h16M4 12h16M4 18h16" />
          <path d="M8 9l2 2 4-4" />
        </svg></div>
      <span>Todo</span>
    </div>
    <div class="icon" data-app="guess">
      <div class="icon-badge badge-purple"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="9" />
          <path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4" />
          <circle cx="12" cy="17" r="0.5" fill="currentColor" />
        </svg></div>
      <span>Guess It</span>
    </div>
    <div class="icon" data-app="sticky">
      <div class="icon-badge badge-yellow"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M5 4h14v12l-4 4H5z" />
          <path d="M15 16v4l4-4z" />
        </svg></div>
      <span>Sticky Notes</span>
    </div>
    <div class="icon" data-app="rps">
      <div class="icon-badge badge-pink"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="7" cy="8" r="3" />
          <rect x="13" y="5" width="6" height="6" />
          <path d="M6 15l4 4M10 15l-4 4" />
        </svg></div>
      <span>Rock Paper Scissors</span>
    </div>
    <div class="icon" data-app="pixel">
      <div class="icon-badge badge-blue"><svg class="icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" />
          <path d="M9 3v18M15 3v18M3 9h18M3 15h18" />
        </svg></div>
      <span>Pixel Art</span>
    </div>
    <div id="windows"></div>
  </div>

  <!-- Dock -->
  <div id="dock" class="hidden"></div>

  <!-- Game -->
  <div id="game" class="hidden">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div class="game-ui">
      <div>Score: <b id="g-score">0</b></div>
      <div>Best: <b id="g-best">0</b></div>
    </div>
    <div id="game-msg" class="game-msg hidden"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
